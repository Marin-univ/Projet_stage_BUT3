version: '3.8'

services:
  db:
    image: postgres:9.6
    container_name: boutique-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: boutique
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ../backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace:cached
      - m2-cache:/root/.m2
      - npm-cache:/root/.npm
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/boutique
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin

volumes:
  pgdata:
  m2-cache:
  npm-cache:

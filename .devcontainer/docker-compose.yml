version: '3.8'

services:
  backend:
    build: ../backend
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace:cached
      - m2-cache:/root/.m2
      - npm-cache:/root/.npm
    depends_on:
      - db

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: boutique
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  m2-cache:
  npm-cache:
  postgres-data: